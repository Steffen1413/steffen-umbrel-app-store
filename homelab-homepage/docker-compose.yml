services:
  app_proxy:
    environment:
      APP_HOST: homepage
      APP_PORT: 3000
      PROXY_AUTH_ADD: 'false'
      PROXY_TRUST_UPSTREAM: 'true'
    container_name: homelab-homepage_app_proxy_1
    depends_on:
      - homepage
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: always
    ports:
      - '3030:3000'
    volumes:
      - ${APP_DATA_DIR}/config:/app/config
    environment:
      HOMEPAGE_ALLOWED_HOSTS: >-
        192.168.188.40:3030,192.168.188.40:13030,localhost:3030,localhost:13030,homepage.local:3030,100.80.141.72:13030,umbrel.local:13030,umbrel.local:3030
    depends_on:
      - dockerproxy
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    container_name: homepage-dockerproxy
    restart: always
    environment:
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      INFO: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
  glances:
    image: nicolargo/glances:latest-full
    container_name: homepage-glances
    restart: always
    pid: host
    ports:
      - '61208:61208'
    environment:
      GLANCES_OPT: '-w'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /:/host:ro
  jelly-sparkle-hub:
    image: ghcr.io/steffen1413/jelly-sparkle-hub:latest
    container_name: jellyfin-discovery-hub
    restart: always
    ports:
      - '4300:80'
