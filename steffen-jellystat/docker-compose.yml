version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: steffen-jellystat_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  db:
    image: postgres:15
    restart: on-failure
    environment:
      POSTGRES_USER: jellystat
      POSTGRES_PASSWORD: jellystatpass
      POSTGRES_DB: jellystat
    volumes:
      - ${APP_DATA_DIR}/db:/var/lib/postgresql/data

  web:
    image: ghcr.io/cyfershepard/jellystat:1.1.7
    restart: on-failure
    depends_on:
      - db
    environment:
      POSTGRES_USER: jellystat
      POSTGRES_PASSWORD: jellystatpass
      POSTGRES_DB: jellystat
      POSTGRES_IP: db
      POSTGRES_PORT: 5432
      JWT_SECRET: supersecretkey
