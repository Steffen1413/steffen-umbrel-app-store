services:
  app_proxy:
    environment:
      APP_HOST: tracearr
      APP_PORT: 3000
      PROXY_AUTH_ADD: 'false'
    container_name: homelab-tracearr_app_proxy_1
    depends_on:
      - tracearr
  tracearr:
    image: ghcr.io/connorgallopo/tracearr:supervised
    container_name: tracearr
    shm_size: 512mb
    mem_limit: 3g
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - '3000:3000'
    environment:
      - TZ=UTC
      - LOG_LEVEL=info
    volumes:
      - tracearr_postgres:/data/postgres
      - tracearr_redis:/data/redis
      - tracearr_data:/data/tracearr
    restart: always
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - http://127.0.0.1:3000/health
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
volumes:
  tracearr_postgres:
    external: true
    name: tracearr_tracearr_postgres
  tracearr_redis:
    external: true
    name: tracearr_tracearr_redis
  tracearr_data:
    external: true
    name: tracearr_tracearr_data
