services:
  app_proxy:
    environment:
      APP_HOST: dashy
      APP_PORT: 8080
      PROXY_AUTH_ADD: 'false'
    container_name: homelab-dashy_app_proxy_1
    depends_on:
      - dashy
  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    restart: always
    ports:
      - '8088:8080'
    volumes:
      - ${APP_DATA_DIR}/user-data:/app/user-data
