version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: homelab-open-webui_web_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"
      PROXY_TRUST_UPSTREAM: "true"

  web:
    container_name: homelab-open-webui_web_1
    image: ghcr.io/open-webui/open-webui:v0.9.6@sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
    restart: unless-stopped
    env_file:
      - ${APP_DATA_DIR}/secrets/open-webui.env
    environment:
      ENABLE_OLLAMA_API: "false"
      OPENAI_API_BASE_URL: "http://hermes-agent_web_1:8642/v1"
      WEBUI_NAME: "Hermes WebUI"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "true"
      ANONYMIZED_TELEMETRY: "false"
    volumes:
      - ${APP_DATA_DIR}/data/open-webui:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s
