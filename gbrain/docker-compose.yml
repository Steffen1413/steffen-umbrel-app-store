services:
  gbrain:
    build: .
    image: local/gbrain:0.42.52
    container_name: gbrain
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./secrets/gbrain.env
    environment:
      HOME: /data
      GBRAIN_HOME: /data
      GBRAIN_NO_ONBOARD_NUDGE: "1"
      GBRAIN_HTTP_CORS_ORIGIN: "http://192.168.188.40:3131,http://localhost:3131"
    volumes:
      - ./data:/data
      - ./brain:/brain
    ports:
      - "3131:3131"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3131/health >/dev/null || curl -fsS http://127.0.0.1:3131/mcp >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
