services:
  app_proxy:
    environment:
      APP_HOST: gbrain_web_1
      APP_PORT: 3131
      PROXY_AUTH_ADD: "false"
      PROXY_TRUST_UPSTREAM: "true"

  web:
    container_name: gbrain_web_1
    build: ${APP_DATA_DIR}
    image: local/gbrain:0.42.52
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ${APP_DATA_DIR}/secrets/gbrain.env
    environment:
      HOME: /data
      GBRAIN_HOME: /data
      GBRAIN_NO_ONBOARD_NUDGE: "1"
      GBRAIN_HTTP_CORS_ORIGIN: "http://192.168.188.40:3131,http://localhost:3131"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/brain:/brain
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3131/health >/dev/null || curl -fsS http://127.0.0.1:3131/mcp >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
